name: Build 2theta desktop app

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "2theta fitting/**"
      - ".github/workflows/build-2theta.yml"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    defaults:
      run:
        working-directory: "2theta fitting"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "2theta fitting/requirements.txt"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller 2theta_fitting_tool.spec --noconfirm --clean

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/2theta-fitting-tool" "../2theta-fitting-tool-macos.zip"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/2theta-fitting-tool" -DestinationPath "../2theta-fitting-tool-windows.zip" -Force

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: 2theta-fitting-tool-macos
          path: 2theta-fitting-tool-macos.zip

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: 2theta-fitting-tool-windows
          path: 2theta-fitting-tool-windows.zip

      - name: Attach artifact to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            2theta-fitting-tool-*.zip
